<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self'; manifest-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'">
  <title>Anagram Circle</title>

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="theme-color" content="#7c6af7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Anagram">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: clamp(12px, 2.5vh, 40px) 20px;
    }

    h1 {
      font-size: 1.2rem;
      font-weight: 400;
      color: #aaa;
      margin-bottom: clamp(12px, 2vh, 32px);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: clamp(12px, 3vh, 48px);
      width: min(420px, 90vw);
    }

    input[type="text"]:not(#kb-capture) {
      padding: 12px 18px;
      font-size: 1.2rem;
      border: 2px solid #444;
      border-radius: 8px;
      background: #0f0f1a;
      color: #fff;
      width: 100%;
      outline: none;
      letter-spacing: 0.05em;
    }

    input[type="text"]:not(#kb-capture):focus {
      border-color: #7c6af7;
    }

    button {
      padding: 12px 20px;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    button:active { transform: scale(0.96); }

    #btnShow, #btnShuffle { flex: 1; }

    #btnShow    { background: #7c6af7; color: #fff; }
    #btnShow:hover { background: #9585f9; }
    #btnShuffle { background: #2e2e4a; color: #ccc; }
    #btnShuffle:hover { background: #3e3e60; }

    #stage {
      position: relative;
      width: min(420px, 90vw, calc(100vh - 280px));
      height: min(420px, 90vw, calc(100vh - 280px));
    }

    .letter {
      position: absolute;
      font-size: 2rem;
      font-weight: 700;
      color: #f0e6ff;
      text-transform: uppercase;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: #2a2050;
      border: 2px solid #5a4aaa;
      transform: translate(-50%, -50%);
      user-select: none;
      cursor: pointer;
      overflow: hidden;
      transition: opacity 0.2s;
    }

    .letter.used {
      opacity: 0.42;
    }

    /* diagonal strikethrough via gradient on the pseudo-element */
    .letter.used::after {
      content: '';
      position: absolute;
      inset: -2px;
      background: linear-gradient(
        135deg,
        transparent calc(50% - 1.5px),
        #b8a8ff calc(50% - 1.5px),
        #b8a8ff calc(50% + 1.5px),
        transparent calc(50% + 1.5px)
      );
      pointer-events: none;
    }

    /* ── answer boxes ────────────────────────────────── */

    #answer-area {
      margin-top: clamp(10px, 2vh, 28px);
      width: min(420px, 90vw, calc(100vh - 280px));
    }

    #answer-boxes {
      display: flex;
      gap: 4px;
      justify-content: center;
    }

    #btnDelete {
      display: block;
      margin: clamp(8px, 1.5vh, 16px) auto 0;
      background: #2e2e4a;
      color: #ccc;
      font-size: 1.3rem;
      line-height: 1;
      padding: 10px 22px;
    }

    #btnDelete:hover { background: #3e3e60; }

    .answer-box {
      position: relative;
      flex: 1;
      max-width: 44px;
      min-width: 18px;
      height: 52px;
      border: 2px solid #3a3a5a;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(0.9rem, 4vw, 1.5rem);
      font-weight: 700;
      color: #f0e6ff;
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.12s, background 0.12s;
    }

    .answer-box.active {
      border-color: #7c6af7;
      background: rgba(124, 106, 247, 0.1);
    }

    /* blinking caret shown on the active empty box */
    .answer-box.active.empty::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 2px;
      height: 1.3em;
      background: #7c6af7;
      animation: caret 1s step-end infinite;
    }

    @keyframes caret {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── hidden keyboard capture input ───────────────── */

    #kb-capture {
      position: fixed;
      bottom: 0;
      left: 50%;
      width: 1px;
      height: 1px;
      opacity: 0;
      font-size: 16px; /* prevents iOS zoom on focus */
      border: none;
      padding: 0;
      pointer-events: none;
    }

    #hint {
      margin-top: clamp(8px, 1.5vh, 24px);
      color: #555;
      font-size: 0.85rem;
    }

    /* ── update banner ───────────────────────────────── */

    #update-banner {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #2a2050;
      border-top: 1px solid #5a4aaa;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.9rem;
      color: #ccc;
      z-index: 100;
    }

    #update-banner[hidden] { display: none; }
    #update-banner span    { flex: 1; }

    #btnUpdate {
      background: #7c6af7;
      color: #fff;
      border: none;
      padding: 8px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    #btnUpdate:hover { background: #9585f9; }

    #btnDismissUpdate {
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 1.2rem;
      padding: 4px 8px;
      line-height: 1;
    }

    #btnDismissUpdate:hover { color: #aaa; }

    /* ── keyboard dismiss button (mobile only, shown when keyboard is up) ── */

    #btnDismissKb {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #2a2050;
      border: none;
      border-top: 1px solid #5a4aaa;
      color: #bbb;
      padding: 14px;
      font-size: 0.95rem;
      cursor: pointer;
      z-index: 200;
      touch-action: manipulation;
    }

    #btnDismissKb[hidden] { display: none; }
  </style>
</head>
<body>
  <h1>Anagram Circle</h1>

  <div class="controls">
    <input type="text" id="wordInput" placeholder="Enter letters or word…" autofocus
      autocorrect="off" autocomplete="off" autocapitalize="off" spellcheck="false">
    <button id="btnShow">Show</button>
    <button id="btnShuffle">Reshuffle</button>
  </div>

  <div id="stage"></div>
  <div id="answer-area">
    <div id="answer-boxes"></div>
    <button id="btnDelete" type="button" aria-label="Delete letter" title="Delete letter">⌫</button>
  </div>
  <div id="hint">Enter a word and press Show (or Enter)</div>

  <button id="btnDismissKb" hidden>Dismiss keyboard ↓</button>

  <div id="update-banner" hidden>
    <span>Update available</span>
    <button id="btnUpdate">Reload</button>
    <button id="btnDismissUpdate" aria-label="Dismiss">✕</button>
  </div>

  <!-- Invisible input that captures the keyboard when an answer box is selected -->
  <input id="kb-capture" type="text" inputmode="text"
         autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">

  <script>
    const stage    = document.getElementById('stage');
    const wordIn   = document.getElementById('wordInput');
    const hint     = document.getElementById('hint');
    const boxArea  = document.getElementById('answer-boxes');
    const kbIn     = document.getElementById('kb-capture');

    // True on touch-primary devices (phones, tablets without mouse).
    // Used to suppress auto-focus of kbIn so the soft keyboard doesn't
    // pop up when tapping a box or using the on-screen ⌫ button.
    const isMobile = window.matchMedia('(pointer: coarse)').matches;

    let wheelSlots  = [];  // [{char, el, used}]
    let answerSlots = [];  // [wheelSlotIndex | null]
    let activeBox   = -1;

    // ── utilities ────────────────────────────────────────────────────────────

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function getBoxEls() { return document.querySelectorAll('.answer-box'); }

    // ── draw circle ──────────────────────────────────────────────────────────

    function drawCircle(letters) {
      stage.innerHTML = '';
      wheelSlots = [];

      const cx     = stage.offsetWidth  / 2;
      const cy     = stage.offsetHeight / 2;
      const n      = letters.length;
      const radius = Math.min(cx - 40, Math.max(80, 160 - n * 2));
      const start  = Math.random() * 2 * Math.PI;

      letters.forEach((ch, i) => {
        const angle = start + (2 * Math.PI * i) / n;
        const el = document.createElement('div');
        el.className = 'letter';
        el.textContent = ch;
        el.style.left = (cx + radius * Math.cos(angle)) + 'px';
        el.style.top  = (cy + radius * Math.sin(angle)) + 'px';

        wheelSlots.push({ char: ch, el, used: false });

        // Prevent focus steal on touch/mouse so the kb-capture stays focused
        el.addEventListener('mousedown',  e => e.preventDefault());
        el.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
        // Desktop: click; mobile: touchend (touchstart prevention blocks synthetic click)
        el.addEventListener('click',    () => tapWheel(i));
        el.addEventListener('touchend', e => { e.preventDefault(); tapWheel(i); });

        stage.appendChild(el);
      });
    }

    // ── draw answer boxes ────────────────────────────────────────────────────

    function drawBoxes() {
      boxArea.innerHTML = '';
      answerSlots.forEach((_, i) => {
        const box = document.createElement('div');
        box.className = 'answer-box empty';
        box.addEventListener('pointerdown', () => selectBox(i));
        boxArea.appendChild(box);
      });
    }

    // ── box selection ────────────────────────────────────────────────────────

    function selectBox(i) {
      if (i < 0 || i >= answerSlots.length) { activeBox = -1; highlight(); return; }
      activeBox = i;
      highlight();
      if (!isMobile) kbIn.focus();
    }

    function highlight() {
      getBoxEls().forEach((b, j) => b.classList.toggle('active', j === activeBox));
    }

    // ── fill / clear ─────────────────────────────────────────────────────────

    function tapWheel(wi) {
      if (activeBox < 0) return;
      // Tapping the same wheel slot that's already in this box — no-op
      if (answerSlots[activeBox] === wi) return;
      // Wheel letter already used by a different box — blocked
      if (wheelSlots[wi].used) return;
      // Clear existing letter first if box is filled
      if (answerSlots[activeBox] !== null) clearBox(activeBox);
      commit(activeBox, wi);
      advance();
    }

    function typeChar(ch) {
      if (activeBox < 0) return;
      // Clear existing letter first if box is filled
      if (answerSlots[activeBox] !== null) clearBox(activeBox);
      const wi = wheelSlots.findIndex(s => s.char === ch && !s.used);
      if (wi === -1) return;
      commit(activeBox, wi);
      advance();
    }

    function commit(bi, wi) {
      answerSlots[bi] = wi;
      wheelSlots[wi].used = true;
      wheelSlots[wi].el.classList.add('used');
      const box = getBoxEls()[bi];
      box.textContent = wheelSlots[wi].char;
      box.classList.remove('empty');
    }

    function clearBox(bi) {
      if (answerSlots[bi] === null) return;
      const wi = answerSlots[bi];
      answerSlots[bi] = null;
      wheelSlots[wi].used = false;
      wheelSlots[wi].el.classList.remove('used');
      const box = getBoxEls()[bi];
      box.textContent = '';
      box.classList.add('empty');
    }

    function backspace() {
      if (activeBox < 0) return;
      if (answerSlots[activeBox] !== null) {
        // Box has a letter — clear it, stay put
        clearBox(activeBox);
      } else if (activeBox > 0) {
        // Box already empty — step left and clear that one
        selectBox(activeBox - 1);
        clearBox(activeBox);
      }
      if (!isMobile) kbIn.focus();
    }

    function advance() {
      // Next empty box to the right, then wrap from start
      for (let i = activeBox + 1; i < answerSlots.length; i++) {
        if (answerSlots[i] === null) { selectBox(i); return; }
      }
      for (let i = 0; i < answerSlots.length; i++) {
        if (answerSlots[i] === null) { selectBox(i); return; }
      }
      // All filled — stay on current box so the user can still edit
      highlight();
    }

    // ── keyboard capture ─────────────────────────────────────────────────────

    kbIn.addEventListener('keydown', e => {
      if (activeBox < 0) return;

      if (e.key === 'Backspace') {
        backspace();
        e.preventDefault(); return;
      }
      if (e.key === 'ArrowLeft')  { if (activeBox > 0) selectBox(activeBox - 1); e.preventDefault(); return; }
      if (e.key === 'ArrowRight') { if (activeBox < answerSlots.length - 1) selectBox(activeBox + 1); e.preventDefault(); return; }
      if (e.key.length === 1 && /[a-zA-Z]/.test(e.key)) {
        typeChar(e.key.toUpperCase()); e.preventDefault();
      }
    });

    // Handles mobile soft keyboard (fires 'input' instead of reliable 'keydown')
    kbIn.addEventListener('input', () => {
      const v = kbIn.value.toUpperCase();
      kbIn.value = '';
      if (v && /[A-Z]/.test(v[0])) typeChar(v[0]);
    });

    // ── show / reshuffle ──────────────────────────────────────────────────────

    function show() {
      // Keep only Latin letters A–Z; drop spaces, digits, punctuation, accents
      const raw = wordIn.value.toUpperCase().replace(/[^A-Z]/g, '');
      if (!raw) return;
      answerSlots = new Array(raw.length).fill(null);
      drawCircle(shuffle([...raw]));
      drawBoxes();
      // Pre-select the first box (highlight only, no focus) so tapping a
      // wheel letter works immediately without popping the soft keyboard.
      activeBox = 0;
      highlight();
      hint.textContent = `${raw.length} letter${raw.length !== 1 ? 's' : ''}  —  tap a letter (or tap a box to type)`;
    }

    function reshuffle() {
      if (!wheelSlots.length) return;
      // Clear answer and redraw circle in a new random order
      const letters = shuffle(wheelSlots.map(s => s.char));
      answerSlots = new Array(letters.length).fill(null);
      drawCircle(letters);
      drawBoxes();
      activeBox = 0;
      highlight();
    }

    document.getElementById('btnShow').addEventListener('click', show);
    document.getElementById('btnShuffle').addEventListener('click', reshuffle);
    wordIn.addEventListener('keydown', e => { if (e.key === 'Enter') show(); });

    // ── keyboard dismiss button ───────────────────────────────────────────────
    // Shown whenever the visual viewport shrinks (keyboard appeared).
    // Hidden again when the keyboard closes or the user taps the button.

    const btnDismissKb = document.getElementById('btnDismissKb');

    if (isMobile && window.visualViewport) {
      window.visualViewport.addEventListener('resize', () => {
        const keyboardUp = window.visualViewport.height < window.screen.height * 0.75;
        btnDismissKb.hidden = !keyboardUp;
      });
    }

    btnDismissKb.addEventListener('click', () => {
      kbIn.blur();
      btnDismissKb.hidden = true;
    });

    // On-screen delete button — prevent focus steal so the soft keyboard stays
    // up, and works regardless of soft-keyboard 'Backspace' keydown quirks.
    const btnDel = document.getElementById('btnDelete');
    btnDel.addEventListener('mousedown',  e => e.preventDefault());
    btnDel.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
    btnDel.addEventListener('click',      backspace);
    btnDel.addEventListener('touchend',   e => { e.preventDefault(); backspace(); });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').then(reg => {
        const banner   = document.getElementById('update-banner');
        const btnUp    = document.getElementById('btnUpdate');
        const btnDis   = document.getElementById('btnDismissUpdate');

        function offerUpdate() { banner.hidden = false; }

        // New SW already waiting when the page loaded (e.g. tab was left open)
        if (reg.waiting) offerUpdate();

        // New SW found and installing
        reg.addEventListener('updatefound', () => {
          const next = reg.installing;
          next.addEventListener('statechange', () => {
            // 'installed' + an existing controller means the new SW is waiting
            if (next.state === 'installed' && navigator.serviceWorker.controller) {
              offerUpdate();
            }
          });
        });

        // When the new SW takes control, reload to serve fresh files
        let reloading = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (!reloading) { reloading = true; location.reload(); }
        });

        btnUp.addEventListener('click', () => {
          if (reg.waiting) reg.waiting.postMessage('SKIP_WAITING');
        });

        btnDis.addEventListener('click', () => { banner.hidden = true; });
      });
    }
  </script>
</body>
</html>
