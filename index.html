<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anagram Circle</title>

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="theme-color" content="#7c6af7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Anagram">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 1.2rem;
      font-weight: 400;
      color: #aaa;
      margin-bottom: 32px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 48px;
    }

    input[type="text"] {
      padding: 12px 18px;
      font-size: 1.2rem;
      border: 2px solid #444;
      border-radius: 8px;
      background: #0f0f1a;
      color: #fff;
      width: 280px;
      outline: none;
      letter-spacing: 0.05em;
    }

    input[type="text"]:focus {
      border-color: #7c6af7;
    }

    button {
      padding: 12px 20px;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    button:active { transform: scale(0.96); }

    #btnShow {
      background: #7c6af7;
      color: #fff;
    }

    #btnShow:hover { background: #9585f9; }

    #btnShuffle {
      background: #2e2e4a;
      color: #ccc;
    }

    #btnShuffle:hover { background: #3e3e60; }

    #stage {
      position: relative;
      width: 420px;
      height: 420px;
    }

    .letter {
      position: absolute;
      font-size: 2rem;
      font-weight: 700;
      color: #f0e6ff;
      text-transform: uppercase;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: #2a2050;
      border: 2px solid #5a4aaa;
      transform: translate(-50%, -50%);
      transition: opacity 0.3s;
      user-select: none;
    }

    #hint {
      margin-top: 20px;
      color: #555;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <h1>Anagram Circle</h1>

  <div class="controls">
    <input type="text" id="wordInput" placeholder="Enter letters or word…" autofocus
      autocorrect="off" autocomplete="off" autocapitalize="off" spellcheck="false">
    <button id="btnShow">Show</button>
    <button id="btnShuffle">Reshuffle</button>
  </div>

  <div id="stage"></div>
  <div id="hint">Enter a word and press Show (or Enter)</div>

  <script>
    const stage = document.getElementById('stage');
    const input = document.getElementById('wordInput');
    const hint  = document.getElementById('hint');
    let currentLetters = [];

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function draw(letters) {
      stage.innerHTML = '';
      if (!letters.length) return;

      const cx = stage.offsetWidth  / 2;
      const cy = stage.offsetHeight / 2;
      const n  = letters.length;

      const radius = Math.min(cx - 40, Math.max(80, 160 - n * 2));
      const startAngle = Math.random() * 2 * Math.PI;

      letters.forEach((ch, i) => {
        const angle = startAngle + (2 * Math.PI * i) / n;
        const x = cx + radius * Math.cos(angle);
        const y = cy + radius * Math.sin(angle);

        const el = document.createElement('div');
        el.className = 'letter';
        el.textContent = ch;
        el.style.left = x + 'px';
        el.style.top  = y + 'px';
        stage.appendChild(el);
      });
    }

    function show() {
      const raw = input.value.replace(/\s/g, '');
      if (!raw) return;
      currentLetters = shuffle([...raw]);
      draw(currentLetters);
      hint.textContent = `${raw.length} letter${raw.length !== 1 ? 's' : ''}  —  press Reshuffle to rearrange`;
    }

    function reshuffle() {
      if (!currentLetters.length) return;
      currentLetters = shuffle(currentLetters);
      draw(currentLetters);
    }

    document.getElementById('btnShow').addEventListener('click', show);
    document.getElementById('btnShuffle').addEventListener('click', reshuffle);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') show(); });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
